<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas 2026 · RE/MAX Confluencia</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2d5a;
    --red:  #CC0000;
    --white:#ffffff;
    --gray: #8892a4;
    --gold: #f5c842;
    --green:#22c55e;
    --blue: #3b82f6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Montserrat',sans-serif;
    background-color:var(--navy);
    background-image:
      radial-gradient(ellipse at 20% 0%,   rgba(204,0,0,0.08)    0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(28,61,143,0.25)  0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height:100vh; color:var(--white);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin   { to{transform:rotate(360deg)} }

  .card {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:28px; padding:40px 36px 36px;
    width:100%; max-width:540px;
    backdrop-filter:blur(14px);
    animation:fadeUp 0.5s ease forwards;
    box-shadow:0 24px 64px rgba(0,0,0,0.35);
  }

  /* HEADER */
  .header { display:flex; align-items:center; gap:14px; margin-bottom:40px; }
  .bar    { width:3px; height:36px; background:var(--red); border-radius:2px; flex-shrink:0; }
  .h-title{ font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; }
  .h-sub  { font-size:10px; color:var(--gray); font-weight:500; letter-spacing:1px; margin-top:3px; }
  .badge  {
    margin-left:auto; display:flex; align-items:center; gap:6px;
    background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.28);
    border-radius:50px; padding:5px 13px;
    font-size:10px; font-weight:700; color:var(--green); letter-spacing:1px; text-transform:uppercase;
  }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.8s infinite; }

  /* 3 CARDS */
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .metric {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px; padding:24px 14px 22px;
    text-align:center;
    transition:transform 0.2s, border-color 0.2s;
  }
  .metric:hover { transform:translateY(-3px); border-color:rgba(255,255,255,0.18); }
  .metric.r { border-top:2px solid var(--red); }
  .metric.b { border-top:2px solid var(--blue); }
  .metric.g { border-top:2px solid var(--gold); }

  .m-icon  { font-size:24px; margin-bottom:12px; }
  .m-value { font-size:28px; font-weight:900; line-height:1; margin-bottom:8px; }
  .metric.r .m-value { color:#ff7070; }
  .metric.b .m-value { color:#60a5fa; }
  .metric.g .m-value { color:var(--gold); }
  .m-label { font-size:9px; font-weight:700; color:var(--gray); letter-spacing:1.2px; text-transform:uppercase; line-height:1.5; }

  /* FOOTER */
  .footer { display:flex; align-items:center; justify-content:space-between; margin-top:24px; }
  .ts     { font-size:10px; color:rgba(255,255,255,0.2); font-weight:500; }
  .btn-ref {
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:7px 14px; font-family:'Montserrat',sans-serif;
    font-size:10px; font-weight:700; color:rgba(255,255,255,0.4);
    cursor:pointer; letter-spacing:1px; text-transform:uppercase;
    transition:all 0.2s; display:flex; align-items:center; gap:6px;
  }
  .btn-ref:hover { background:rgba(255,255,255,0.1); color:var(--white); }
  .btn-ref.spin svg { animation:spin 0.7s linear infinite; }

  @media(max-width:420px){
    .card{padding:28px 18px 24px;}
    .m-value{font-size:22px;}
    .grid{gap:10px;}
  }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="bar"></div>
    <div>
      <div class="h-title">RE/MAX Confluencia</div>
      <div class="h-sub">Metas grupales · 2026</div>
    </div>
    <div class="badge"><div class="dot"></div>Live</div>
  </div>

  <div class="grid">
    <div class="metric r">
      <div class="m-icon">💰</div>
      <div class="m-value" id="vFact">—</div>
      <div class="m-label">Facturación<br>esperada</div>
    </div>
    <div class="metric b">
      <div class="m-icon">🏠</div>
      <div class="m-value" id="vCart">—</div>
      <div class="m-label">Cartera de<br>propiedades</div>
    </div>
    <div class="metric g">
      <div class="m-icon">🎯</div>
      <div class="m-value" id="vCapt">—</div>
      <div class="m-label">Captaciones<br>esperadas</div>
    </div>
  </div>

  <div class="footer">
    <div class="ts" id="ts">Conectando…</div>
    <button class="btn-ref" id="btnR" onclick="load()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Actualizar
    </button>
  </div>

</div>
<script>
  // ─── ÚNICA LÍNEA QUE HAY QUE EDITAR ───────────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxgLBNmJ5e6vVHFO_fKLFoJAdGrYH2ld3SO_d9iRQ-0YOc-0yxhRVmvzOd_yw3u2Ozig/exec';
  // ──────────────────────────────────────────────────────────────

  function load() {
    const btn = document.getElementById('btnR');
    btn.classList.add('spin');

    const cb = 'cb' + Date.now();
    const s  = document.createElement('script');
    s.src    = SCRIPT_URL + '?callback=' + cb;

    const t = setTimeout(() => { clean(); setTs('Sin respuesta del servidor'); }, 7000);

    window[cb] = d => {
      clearTimeout(t); clean();
      anim('vFact', d.facturacion, true);
      anim('vCart', d.cartera,     false);
      anim('vCapt', d.captaciones, false);
      setTs('Actualizado ' + new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
    };

    s.onerror = () => { clearTimeout(t); clean(); setTs('Error de conexión'); };
    document.head.appendChild(s);

    function clean() {
      btn.classList.remove('spin');
      s.parentNode && s.parentNode.removeChild(s);
      delete window[cb];
    }
  }

  function anim(id, target, money) {
    const el = document.getElementById(id);
    const dur = 900, t0 = performance.now();
    (function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      const v = Math.round(target * (1 - Math.pow(1 - p, 3)));
      el.textContent = money ? fmt(v) : v.toLocaleString('es-AR');
      if (p < 1) requestAnimationFrame(step);
    })(t0);
  }

  function fmt(n) {
    if (n >= 1e6) return '$' + (n/1e6).toFixed(1).replace('.',',') + 'M';
    if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
    return '$' + n.toLocaleString('es-AR');
  }

  function setTs(msg) { document.getElementById('ts').textContent = msg; }

  load();
  setInterval(load, 2 * 60 * 1000);
</script>
</body>
</html>
